version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    cooldown:
      default-days: 7
      semver-major-days: 21
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      semantic-release:
        patterns:
          - semantic-release
          - "@semantic-release/*"
          - conventional-changelog-conventionalcommits
      eslint-and-formatting:
        patterns:
          - eslint
          - "@eslint/*"
          - typescript-eslint
          - eslint-config-prettier
          - prettier
          - globals
      tests:
        patterns:
          - vitest
          - "@vitest/*"
      types:
        patterns:
          - "@types/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Etc/UTC
    cooldown:
      default-days: 14
    open-pull-requests-limit: 5
    groups:
      workflow-actions:
        patterns:
          - "*"
