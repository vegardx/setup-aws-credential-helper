name: Workflow security

on:
  pull_request:
    paths:
      - ".github/**"
      - "action.yml"
      - "release.config.mjs"
      - "scripts/check-release-policy.mjs"
      - "scripts/check-workflows.mjs"
      - "scripts/update-major-tag.sh"
      - "package.json"
      - "package-lock.json"
      - "zizmor.yml"
  push:
    branches:
      - main
    paths:
      - ".github/**"
      - "action.yml"
      - "release.config.mjs"
      - "scripts/check-release-policy.mjs"
      - "scripts/check-workflows.mjs"
      - "scripts/update-major-tag.sh"
      - "package.json"
      - "package-lock.json"
      - "zizmor.yml"

permissions:
  contents: read

concurrency:
  group: workflow-security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    name: Pinning and permissions policy
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.10.0"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Enforce workflow and release policy
        run: |
          npm run check:workflows
          npm run check:release

  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: -color

  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          annotations: true
          config: zizmor.yml
          online-audits: false
