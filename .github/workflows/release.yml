name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify releasable source
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.10.0"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Verify production dependencies
        run: |
          npm ls --omit=dev --all
          npm audit --omit=dev --audit-level=high

      - name: Verify source and mocked subprocess behavior
        run: |
          npm run format:check
          npm run lint
          npm run typecheck
          npm run test:coverage

      - name: Build and verify committed bundles
        run: |
          npm run build
          npm run verify:dist

      - name: Verify workflow and release policy
        run: |
          npm run check:workflows
          npm run check:release

  release:
    name: Create semantic release
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write # semantic-release creates the immutable tag and GitHub Release notes.
    outputs:
      released: ${{ steps.semantic.outputs.new-release-published }}
      version: ${{ steps.semantic.outputs.new-release-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.10.0"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Create immutable release tag and GitHub Release notes
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

  major-tag:
    name: Move floating major tag
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write # Moves only the floating vX tag after a real release.
    steps:
      - name: Checkout released history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Move major tag to the verified immutable release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        run: ./scripts/update-major-tag.sh
