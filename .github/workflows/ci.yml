name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify source, tests, and bundles
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.10.0"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Verify dependency tree and production audit
        run: |
          npm ls --omit=dev --all
          npm audit --omit=dev --audit-level=high

      - name: Check formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Run strict typecheck
        run: npm run typecheck

      - name: Run unit and mocked subprocess tests with coverage
        run: npm run test:coverage

      - name: Build production bundles
        run: npm run build

      - name: Verify committed bundles and helper isolation
        run: npm run verify:dist
