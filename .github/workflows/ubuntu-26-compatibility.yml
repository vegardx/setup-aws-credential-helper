name: Ubuntu 26 compatibility

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ubuntu-26-compatibility-${{ github.ref }}
  cancel-in-progress: true

jobs:
  canary:
    name: Public preview (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-26.04
          - ubuntu-26.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.10.0"
          cache: npm

      - name: Install locked dependencies and consumer CLIs
        run: |
          npm ci
          scripts/install-integration-tools.sh

      - name: Run selected-emulator acceptance suite
        run: npm run test:offline

      - name: Remove any retained emulator containers
        if: always()
        run: >-
          docker ps --all --quiet
          --filter label=io.github.vegardx.setup-aws-credential-helper.test=true
          | xargs --no-run-if-empty docker rm --force
