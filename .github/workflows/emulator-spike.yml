name: Emulator comparison spike

on:
  pull_request:
    paths:
      - ".github/workflows/emulator-spike.yml"
      - "tests/emulator-spike.test.ts"
      - "tests/emulator/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: emulator-spike-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  compare:
    name: ${{ matrix.candidate }} on ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        candidate:
          - floci
          - moto
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.10.0"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run common acceptance spike
        env:
          EMULATOR_CANDIDATE: ${{ matrix.candidate }}
        run: npm run test:emulator
